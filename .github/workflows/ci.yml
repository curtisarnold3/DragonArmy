name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Run pytest
        run: pytest tests/ -v

  constraints:
    name: Enforce Hard Constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: C-1 grep check (no LLM imports in pipeline/)
        run: |
          ! grep -rE "^\s*(import|from)\s+(anthropic|openai|langchain|transformers)" pipeline/ || {
            echo "ERROR: Found forbidden LLM imports in pipeline/"
            exit 1
          }

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve base image digest
        run: docker buildx imagetools inspect python:3.11-slim-bookworm

      - name: Resolve redis image digest
        run: docker buildx imagetools inspect redis:7.4-alpine

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t gnss-agg:ci .

  test-in-container:
    name: Test in Container
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -f docker/Dockerfile -t gnss-agg:ci .

      - name: Run tests in container
        run: |
          docker run --rm gnss-agg:ci pytest tests/unit/ -v

      - name: Golden master diagnostic
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            -e PYTHONPATH=/app \
            -w /app \
            gnss-agg:ci \
            python3 tests/integration/run_golden_check.py
