# GNSS-AGG Configuration
# Layout constants and detection parameters for Slingshot "GNSS SPOOFING (Standard)" layout
# All mask coordinates are normalized (0.0-1.0) to support multiple resolutions

base_map:
  method: temporal_median
  sample_frames: 45

masks:
  title:
    x_norm: [0.328, 0.676]   # 840/2560, 1730/2560
    y_norm: [0.050, 0.117]   # 60/1198, 140/1198
  logo:
    x_norm: [0.922, 1.000]   # 2360/2560, 2560/2560
    y_norm: [0.935, 1.000]   # 1120/1198, 1198/1198

world:
  tile_width: 1197

detection:
  threshold: 14.0  # luminance-weighted diff threshold
  luminance_weights: [0.114, 0.587, 0.299]  # BGR weights

# Pixel regions (all coordinates in video frame space)
regions:
  title_box:
    x: 50
    y: 20
    width: 300
    height: 60

  logo_box:
    x: 1100
    y: 850
    width: 150
    height: 100

  colorbar_strip:
    x: 1200
    y: 100
    width: 50
    height: 800

# Time model
time:
  origin: "2026-06-09T00:00:00Z"  # UTC epoch for index 0
  window_duration_minutes: 10

# Segmentation
segmentation:
  signal: title_region_frame_diff
  transition_threshold: 0.5
  title_diff_threshold: 8.0
  representative_position: 0.55

time_model:
  origin_utc: "2026-06-09T00:00:00Z"
  window_lookback_min: 90
  step_min: 10
  intro_segment: 0

# Rendering
rendering:
  overlay_alpha: 0.6
  gamma: 0.7
  hourly_grid_panels: 23

# Custom colormap (6-stop LUT: window count → RGB)
colormap:
  stops:
    - [0, [0, 0, 0]]           # 0 windows = transparent/black
    - [1, [0, 0, 139]]         # 1 window = dark blue
    - [6, [0, 128, 255]]       # 6 windows = blue
    - [12, [255, 255, 0]]      # 12 windows = yellow
    - [24, [255, 128, 0]]      # 24 windows = orange
    - [57, [255, 0, 0]]        # 57 windows = red (max observed)

# Rendering
render:
  colormap:
    - [0.00, [43, 212, 255]]
    - [0.28, [70, 255, 140]]
    - [0.52, [255, 226, 74]]
    - [0.74, [255, 138, 43]]
    - [0.90, [255, 55, 55]]
    - [1.00, [255, 235, 235]]
  gamma: 0.7
  overlay_alpha: 0.6

hourly:
  cadence_steps: 6

poster:
  crop:
    y_top: 150
    y_bottom: 1070

# Audit / validation values (for golden-master tests)
audit:
  expected_segments: 130
  max_persistence: 59
  total_detection_pixels: 29539
  seam_col: 693
