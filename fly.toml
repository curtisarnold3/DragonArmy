[app]
name = "totaleclipseoftheheatmap-api"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile.fly"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 2
    soft_limit = 1

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[[mounts]]
  source = "job_artifacts"
  destination = "/data/jobs"
  initial_size = "10gb"
